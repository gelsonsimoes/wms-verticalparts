name: Deploy → VPS (Backend Express)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'ecosystem.config.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch: # Deploy manual pelo GitHub Actions

jobs:
  deploy-backend:
    name: Deploy Express Server to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 72.61.37.129
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            # 1. Garantir que o diretório de logs existe
            mkdir -p /var/log/wms-api

            # 2. Clonar ou atualizar o repositório
            if [ -d "/var/www/wms-verticalparts/.git" ]; then
              echo "📦 Atualizando repositório..."
              cd /var/www/wms-verticalparts
              git pull origin main
            else
              echo "📦 Clonando repositório pela primeira vez..."
              mkdir -p /var/www
              cd /var/www
              git clone https://github.com/gelsonsimoes/wms-verticalparts.git
              cd wms-verticalparts
            fi

            # 3. Instalar dependências de produção
            echo "📚 Instalando dependências..."
            npm ci --omit=dev

            # 4. Reiniciar ou iniciar o PM2
            echo "🚀 Reiniciando servidor com PM2..."
            if pm2 list | grep -q "wms-api"; then
              pm2 restart wms-api
            else
              pm2 start ecosystem.config.cjs --env production
              pm2 save
            fi

            echo "✅ Backend deployado com sucesso!"
            pm2 status wms-api
