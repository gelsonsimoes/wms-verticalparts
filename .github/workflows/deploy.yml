# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD — WMS VerticalParts → Hostinger (FTP) + Supabase Migrations
# Trigger: push na branch main
# Build:   Node 20 + Vite + injeção de variáveis de ambiente
# Deploy:  FTP via SamKirkland/FTP-Deploy-Action
# Configurado por Antigravity (Gemini Round 3) em 2026-03-21
# ═══════════════════════════════════════════════════════════════════════════════
name: 🚀 Build & Deploy → Hostinger

on:
  push:
    branches:
      - main           # Dispara a cada push na branch principal
  workflow_dispatch:   # Permite rodar manualmente pela aba Actions do GitHub

jobs:
  # ── JOB 1: Build Vite + Deploy FTP ──────────────────────────────────────────
  build-and-deploy:
    name: ⚛️  Build Vite + 🌐 FTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Node.js com cache de npm
      - name: ⚙️  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependências (npm ci é mais rápido e determinístico que npm install)
      - name: 📦 Instalar dependências
        run: npm ci

      # 4. Build com variáveis de ambiente injetadas pelos GitHub Secrets
      - name: 🔨 Build de produção (Vite)
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL:           ${{ secrets.VITE_APP_URL }}
          NODE_ENV:               production
        run: npm run build

      # 5. Verificação rápida da dist/
      - name: 🔍 Verificar build (dist/)
        run: |
          echo "📁 Arquivos gerados:"
          ls -lah dist/
          echo "📄 Início do index.html:"
          head -8 dist/index.html

      # 6. Deploy FTP → Hostinger
      - name: 🌐 Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Origem: pasta gerada pelo Vite
          local-dir: ./dist/

          # Destino: raiz pública do domínio na Hostinger
          # ⚠️ Ajuste se o seu domínio usar: /domains/seusite.com.br/public_html/
          server-dir: /public_html/

          protocol:               ftp
          port:                   21
          dangerous-clean-slate:  false  # true = apaga TUDO antes do upload
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*

      # 7. Resumo pós-deploy
      - name: ✅ Deploy concluído
        run: |
          echo "════════════════════════════════════════════════"
          echo " ✅ WMS VerticalParts publicado com sucesso!"
          echo " Branch  : ${{ github.ref_name }}"
          echo " Commit  : ${{ github.sha }}"
          echo " Autor   : ${{ github.actor }}"
          echo " Data    : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "════════════════════════════════════════════════"

  # ── JOB 2: Supabase Migrations (legado — roda só se houver mudanças) ─────────
  supabase-migrations:
    name: 🗄️  Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Só roda se houver mudanças em migrations
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'supabase/migrations/') ||
      contains(github.event.head_commit.added,    'supabase/migrations/')

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Supabase CLI
        run: npm install -g supabase

      - name: 🔗 Link projeto Supabase
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 📋 Listar migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🚀 Aplicar migrations em produção
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: ✅ Migrations aplicadas
        if: success()
        run: echo "✅ Migrations aplicadas com sucesso!"

      - name: ❌ Falha nas migrations
        if: failure()
        run: echo "❌ Falha ao aplicar migrations — revise os arquivos em supabase/migrations/"
