# Nginx — Reverse proxy para o backend WMS VerticalParts
# Destino: /etc/nginx/sites-available/wms-api
# Ativar: ln -s /etc/nginx/sites-available/wms-api /etc/nginx/sites-enabled/
# SSL:    certbot --nginx -d api.wmsverticalparts.com.br

server {
    listen 80;
    server_name api.wmsverticalparts.com.br;

    # Certbot vai inserir o bloco SSL aqui automaticamente

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Logs
    access_log /var/log/nginx/wms-api.access.log;
    error_log  /var/log/nginx/wms-api.error.log;

    # Proxy para o Express na porta 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       'upgrade';
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeout generoso para chamadas de IA (Claude pode demorar)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # Health check público (sem autenticação)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
